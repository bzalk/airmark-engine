name: Publish npm packages

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an npm version with trusted publishing support
        run: npm install --global "npm@^11.5.1"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Check golden fixtures
        run: npm run goldens:check

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          test "$RELEASE_TAG" = "v$VERSION"
          test "$(node -p "require('./packages/engine/package.json').version")" = "$VERSION"
          test "$(node -p "require('./packages/svg/package.json').version")" = "$VERSION"
          test "$(node -p "require('./packages/react/package.json').version")" = "$VERSION"

      - name: Publish engine
        run: npm view "@airspec/airmark-engine@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1 || npm publish --workspace=@airspec/airmark-engine --access public

      - name: Publish SVG adapter
        run: npm view "@airspec/airmark-svg@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1 || npm publish --workspace=@airspec/airmark-svg --access public

      - name: Publish React adapter
        run: npm view "@airspec/airmark-react@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1 || npm publish --workspace=@airspec/airmark-react --access public
